<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>D-Garden · 나무에게 에너지를</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: #020208;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 20px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* ── 리모콘 버튼 공통 ── */
    .remote-btn {
      width: 100%;
      padding: 22px 16px;
      border-radius: 18px;
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .remote-btn:active {
      transform: scale(0.94);
    }

    /* 긍정 — 에메랄드 그린 */
    .btn-pos {
      background: linear-gradient(135deg, rgba(0,255,140,0.13), rgba(0,210,255,0.10));
      border-color: rgba(0, 255, 140, 0.35);
      color: #00ff99;
      text-shadow: 0 0 14px rgba(0,255,140,0.65);
      box-shadow: 0 0 22px rgba(0,255,140,0.10), inset 0 1px 0 rgba(0,255,140,0.10);
    }
    .btn-pos:active {
      background: linear-gradient(135deg, rgba(0,255,140,0.28), rgba(0,210,255,0.22));
      border-color: rgba(0, 255, 140, 0.75);
      box-shadow: 0 0 36px rgba(0,255,140,0.28);
    }

    /* 부정 — 마젠타/퍼플 */
    .btn-neg {
      background: linear-gradient(135deg, rgba(238,85,255,0.12), rgba(180,0,180,0.08));
      border-color: rgba(238, 85, 255, 0.30);
      color: #ee55ff;
      text-shadow: 0 0 14px rgba(238,85,255,0.60);
      box-shadow: 0 0 22px rgba(238,85,255,0.08), inset 0 1px 0 rgba(238,85,255,0.08);
    }
    .btn-neg:active {
      background: linear-gradient(135deg, rgba(238,85,255,0.26), rgba(180,0,180,0.20));
      border-color: rgba(238, 85, 255, 0.70);
      box-shadow: 0 0 36px rgba(238,85,255,0.26);
    }

    /* 전송 시 펄스 링 애니메이션 */
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.55; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    .ripple-ring {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      animation: ripple 0.5s ease-out forwards;
      pointer-events: none;
    }
    .ripple-ring.pos { background: rgba(0,255,140,0.25); }
    .ripple-ring.neg { background: rgba(238,85,255,0.22); }

    /* 연결 상태 도트 */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online  { background: #00ff99; box-shadow: 0 0 8px #00ff99; animation: blink 2s infinite; }
    .status-dot.offline { background: rgba(255,255,255,0.25); }
    .status-dot.loading { background: #ffaa00; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.pos  { border-color: rgba(0,255,140,0.40); }
    #toast.neg  { border-color: rgba(238,85,255,0.35); }

    /* 비활성(미연결) 상태 */
    .btn-disabled {
      opacity: 0.32;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 배경 빛 오브 -->
  <div class="bg-orb" style="width:300px;height:300px;top:-80px;right:-60px;background:rgba(0,200,100,0.07);"></div>
  <div class="bg-orb" style="width:260px;height:260px;bottom:-60px;left:-60px;background:rgba(180,0,255,0.06);"></div>

  <!-- 메인 레이아웃 -->
  <div class="relative z-10 flex flex-col h-full px-5 py-6" style="max-height:100dvh;">

    <!-- 상단 로고 + 연결 상태 -->
    <div class="flex items-center justify-between mb-5">
      <div>
        <p style="font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.22em;color:rgba(255,255,255,0.22);text-transform:uppercase;">
          D · G A R D E N
        </p>
        <p style="font-size:0.58rem;color:rgba(255,255,255,0.12);letter-spacing:0.06em;margin-top:2px;">
          Ambient Mental Guardian
        </p>
      </div>
      <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5"
           style="border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);">
        <span class="status-dot loading" id="status-dot"></span>
        <span id="status-text" style="font-size:0.65rem;color:rgba(255,255,255,0.35);font-family:'Space Mono',monospace;">
          연결 중...
        </span>
      </div>
    </div>

    <!-- 히어로 -->
    <div class="text-center mb-5">
      <div style="font-size:2.5rem;line-height:1;margin-bottom:8px;">🌿</div>
      <h1 style="font-size:1.12rem;font-weight:700;color:rgba(255,255,255,0.88);letter-spacing:-0.02em;line-height:1.4;">
        나무에게 에너지를 보내세요
      </h1>
      <p style="font-size:0.72rem;color:rgba(255,255,255,0.32);margin-top:5px;">
        버튼 하나로 발표자 식물이 실시간 반응해요
      </p>
    </div>

    <!-- 버튼 리모콘 카드 -->
    <div class="glass flex-1 flex flex-col p-5 gap-4" id="remote-card" style="min-height:0;">

      <!-- 긍정 섹션 -->
      <div class="flex flex-col gap-3 flex-1">
        <p style="font-size:0.58rem;color:rgba(0,255,140,0.45);letter-spacing:0.14em;text-transform:uppercase;font-family:'Space Mono',monospace;">
          ▲ 긍정 에너지
        </p>
        <div class="grid grid-cols-3 gap-3 flex-1">
          <button class="remote-btn btn-pos" onclick="send('오~', 'pos')">오~</button>
          <button class="remote-btn btn-pos" onclick="send('와우', 'pos')">와우</button>
          <button class="remote-btn btn-pos" onclick="send('굿', 'pos')">굿</button>
        </div>
      </div>

      <!-- 구분선 -->
      <div style="height:1px;background:rgba(255,255,255,0.06);"></div>

      <!-- 부정 섹션 -->
      <div class="flex flex-col gap-3 flex-1">
        <p style="font-size:0.58rem;color:rgba(238,85,255,0.45);letter-spacing:0.14em;text-transform:uppercase;font-family:'Space Mono',monospace;">
          ▼ 부정 에너지
        </p>
        <div class="grid grid-cols-3 gap-3 flex-1">
          <button class="remote-btn btn-neg" onclick="send('에이', 'neg')">에이</button>
          <button class="remote-btn btn-neg" onclick="send('별로', 'neg')">별로</button>
          <button class="remote-btn btn-neg" onclick="send('흠...', 'neg')">흠...</button>
        </div>
      </div>

    </div>

    <!-- 전송 카운터 -->
    <div class="text-center mt-4">
      <p id="sent-count" style="font-size:0.62rem;color:rgba(255,255,255,0.18);font-family:'Space Mono',monospace;">
        이번 세션 0회 전송
      </p>
    </div>

  </div>

  <!-- 토스트 -->
  <div id="toast" class="glass px-6 py-3">
    <p id="toast-msg" style="font-size:0.82rem;font-weight:600;"></p>
  </div>

  <script>
    let channel   = null;
    let connected = false;
    let sentCount = 0;

    const statusDot   = document.getElementById('status-dot');
    const statusText  = document.getElementById('status-text');
    const sentCountEl = document.getElementById('sent-count');
    const toast       = document.getElementById('toast');
    const toastMsg    = document.getElementById('toast-msg');
    const remoteCard  = document.getElementById('remote-card');

    // ─── 연결 상태 ─────────────────────────────────────────────────
    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
      remoteCard.classList.toggle('btn-disabled', state !== 'online');
    }

    // ─── 토스트 ────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(text, type) {
      toastMsg.textContent = text;
      toastMsg.style.color = type === 'pos' ? '#00ff99' : '#ee55ff';
      toastMsg.style.textShadow = type === 'pos'
        ? '0 0 14px rgba(0,255,140,0.8)'
        : '0 0 14px rgba(238,85,255,0.75)';
      toast.className = 'glass px-6 py-3 ' + type;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // ─── 버튼 리플 ─────────────────────────────────────────────────
    function triggerRipple(btn, type) {
      const el = document.createElement('div');
      el.className = 'ripple-ring ' + type;
      btn.appendChild(el);
      setTimeout(() => el.remove(), 500);
    }

    // ─── 전송 ──────────────────────────────────────────────────────
    async function send(text, type) {
      if (!channel || !connected) return;
      const btn = event.currentTarget;
      triggerRipple(btn, type);
      try {
        await channel.send({
          type:    'broadcast',
          event:   'crowd_message',
          payload: { text, sentiment: type }, // 'pos' | 'neg' 직접 전달
        });
        sentCount++;
        sentCountEl.textContent = `이번 세션 ${sentCount}회 전송`;
        const labels = { 'pos': '⚡ 나무가 반응했어요!', 'neg': '🌫️ 나무가 느꼈어요!' };
        showToast(labels[type] || '전송됨', type);
      } catch (err) {
        console.error('[D-Garden audience] 전송 실패:', err);
        setStatus('offline', '전송 오류');
      }
    }

    // ─── Supabase 초기화 ───────────────────────────────────────────
    async function bootstrap() {
      let spec;
      try {
        const res = await fetch('./spec.json');
        spec = await res.json();
      } catch (e) {
        setStatus('offline', '설정 로드 실패');
        return;
      }

      const url  = spec.SUPABASE_URL;
      const key  = spec.SUPABASE_ANON_KEY;
      const name = spec.REALTIME_CHANNEL || 'd-garden-crowd';

      if (!url || url.startsWith('YOUR_')) {
        setStatus('offline', '미설정 (spec.json 확인)');
        return;
      }

      try {
        setStatus('loading', '연결 중...');
        const client = window.supabase.createClient(url, key);
        channel = client.channel(name);

        channel.subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            connected = true;
            setStatus('online', 'LIVE ●');
          } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            connected = false;
            setStatus('offline', '연결 끊김');
          }
        });
      } catch (err) {
        setStatus('offline', '연결 실패');
        console.error('[D-Garden audience] Supabase 오류:', err);
      }
    }

    bootstrap();
  </script>

</body>
</html>
